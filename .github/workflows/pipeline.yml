name: Instagram Stoicism Pipeline

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install fonts
        run: sudo apt-get install -y fonts-liberation fonts-dejavu

      - name: Setup data dirs
        run: mkdir -p data/current_run/raw_images data/current_run/slides

      - name: Stage 1 — Hook Research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python stages/hook_research.py

      - name: Stage 2 — Fetch Images
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python stages/fetch_images.py

      - name: Stage 3 — Compose Slides
        run: python stages/compose_slides.py

      - name: Stage 4 — Write Caption
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python stages/caption_writer.py

      - name: Stage 5 — Publish to Zernio
        env:
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          ZERNIO_ACCOUNT_ID: ${{ secrets.ZERNIO_ACCOUNT_ID }}
        run: python stages/publisher.py

      - name: Save run artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-run-${{ github.run_number }}
          path: data/current_run/
          retention-days: 7
